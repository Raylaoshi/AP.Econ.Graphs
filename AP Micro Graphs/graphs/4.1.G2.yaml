title: Natural Monopoly
title_zh: 自然垄断
label: 4.1.G2
eyebrow: Unit 4 — Imperfect Competition
eyebrow_zh: 第四单元 — 不完全竞争
description: |
  <p>A <strong>Natural Monopoly</strong> is characterized by continuously declining Long-Run Average Total Cost (LRATC) and Marginal Cost (MC) curves due to massive fixed costs.</p>
  <p><strong>Interactive features to explore:</strong></p>
  <ol>
    <li><strong>The Regulatory Ceiling:</strong> Drag the P<sub>c</sub> line. Notice how it creates a horizontal "New MR" curve up to the Demand curve, before dropping vertically.</li>
    <li><strong>Rational Firm Behavior:</strong> The firm automatically adjusts its production to where <strong>New MR = MC</strong>. Notice how a binding price ceiling forces the firm to increase output and lower prices!</li>
    <li><strong>The Dilemma:</strong> Try to eliminate the DWL by dropping the Price Ceiling to the socially optimal point (P = MC). Because LRATC is so distant from MC, the firm suffers a massive loss and would require a government subsidy to survive.</li>
  </ol>
description_zh: |
  <p><strong>自然垄断</strong>的特征是，由于存在巨大的固定成本，其长期平均总成本 (LRATC) 和边际成本 (MC) 曲线呈持续下降的形态。</p>
  <p><strong>动一动：</strong></p>
  <ol>
    <li><strong>价格上限监管：</strong> 拖动 P<sub>c</sub> 线（可选择隐藏）。观察它是如何创造出一条水平的“新 MR”曲线，并在接触到需求曲线时垂直落下的。</li>
    <li><strong>理性的企业行为：</strong> 企业会自动调整产量至 <strong>新 MR = MC</strong> 处。注意有约束力的价格上限是如何迫使企业增加产量并降低价格的！</li>
    <li><strong>监管困境：</strong> 试着将价格上限降至社会最优点 (P = MC) 以完全消除无谓损失 (DWL)。你会发现，由于 LRATC 远远高于 MC，企业将遭受巨大亏损，必须依靠政府补贴才能生存。</li>
  </ol>

schema: EconSchema
version: 11

params:
  - {name: priceCeiling, value: 50, min: 20, max: 160, round: 1}
  - {name: showCeiling, value: true}
  - {name: showProfit, value: true}
  - {name: showDWL, value: true}

calcs:
  # Demand constraint at current Price Ceiling (P = 160 - Q)
  Qd_at_Pc: (max(0, 160 - (params.priceCeiling)))
  MR_at_Qd: (160 - 2 * (calcs.Qd_at_Pc))
  
  # Automated Firm Optimization Logic
  # Unregulated MR=MC intersection is perfectly Q=60.
  Q_opt: (max(60, calcs.Qd_at_Pc))
  
  # The highest price the firm can charge for Q_opt, capped by the ceiling
  P_opt: (min((params.priceCeiling), 160 - (calcs.Q_opt)))
  
  # Cost Engine (MC shifted down to +150, LRATC maintained at +90 for visual separation)
  MC_opt: (8400 / ((calcs.Q_opt) + 150))
  ATC_opt: (8400 / ((calcs.Q_opt) + 90) + 880 / (calcs.Q_opt))
  profit: (((calcs.P_opt) - (calcs.ATC_opt)) * (calcs.Q_opt))

  # Geometric Centroid for DWL Area Label (grey)
  # Socially optimal target (MC = Demand) is exactly Q=130
  dwlX: (((calcs.Q_opt) + 130) / 2)
  dwlY: (((160 - (calcs.dwlX)) + (8400 / ((calcs.dwlX) + 150))) / 2)

layout:
  OneGraphPlusSidebar:
    graph:
      xAxis: {title: Quantity, max: 160, ticks: 16}
      yAxis: {title: Price / Cost, max: 160, min: 0, ticks: 16}
      objects:

        # ══════════════════════════════════════════════════════════════
        # AREAS (Drawn first to stay in background)
        # ══════════════════════════════════════════════════════════════
        - Rectangle:
            x1: 0
            y1: (calcs.P_opt)
            x2: (calcs.Q_opt)
            y2: (calcs.ATC_opt)
            color: "`${calcs.profit >= 0 ? 'green' : 'firebrick'}`"
            opacity: 0.2
            show: params.showProfit

        - Area:
            fn1: 160 - (x)
            fn2: 8400 / ((x) + 150)
            min: (calcs.Q_opt)
            max: 130
            color: grey
            opacity: 0.3
            show: params.showDWL

        # ══════════════════════════════════════════════════════════════
        # BASE CURVES
        # ══════════════════════════════════════════════════════════════
        - Line:
            yIntercept: 160
            slope: -1
            color: dodgerblue
            strokeWidth: 3
            label: {text: "`\\t{D = AR}`", x: 160}

        - Line:
            yIntercept: 160
            slope: -2
            color: lightgrey
            lineStyle: dashed
            strokeWidth: 2
            label: {text: "`\\t{Original MR}`", x: 75}

        # Convex MC (Shifted further down)
        - Curve:
            fn: 8400 / ((x) + 150)
            color: red
            strokeWidth: 3
            label: {text: "`\\t{MC}`", x: 160}

        # Distant LRATC (Unchanged)
        - Curve:
            fn: 8400 / ((x) + 90) + 880 / (x)
            min: 6
            color: orange
            strokeWidth: 3
            label: {text: "`\\t{LRATC}`", x: 160}

        # ══════════════════════════════════════════════════════════════
        # DYNAMIC INTERSECTION POINTS
        # ══════════════════════════════════════════════════════════════
        
        # Firm's calculated actual market position
        - Point:
            coordinates: [(calcs.Q_opt), (calcs.P_opt)]
            color: dodgerblue
            r: 5
            droplines:
              vertical: "`Q = ${calcs.Q_opt.toFixed(0)}`"
              horizontal: "`P = ${calcs.P_opt.toFixed(0)}`"

        # New MR = MC Intersection Marker
        - Point:
            coordinates: [(calcs.Q_opt), (calcs.MC_opt)]
            color: firebrick
            r: 5
            label: {text: "`\\t{OPT^*}`", position: tr, fontSize: 11, bgcolor: none}
            show: params.showCeiling

        # ATC at optimal output
        - Point:
            coordinates: [(calcs.Q_opt), (calcs.ATC_opt)]
            color: orange
            r: 4
            droplines:
              horizontal: "`ATC = ${calcs.ATC_opt.toFixed(0)}`"
              vertical: "`Q = ${calcs.Q_opt.toFixed(0)}`"
            show: params.showProfit

        # ══════════════════════════════════════════════════════════════
        # LABELS
        # ══════════════════════════════════════════════════════════════
        - Label:
            coordinates: [(calcs.dwlX), (calcs.dwlY)]
            text: "`\\t{DWL}`"
            color: grey
            fontSize: 12
            bgcolor: none
            show: (params.showDWL && calcs.Q_opt < 130)

       # ══════════════════════════════════════════════════════════════
        # PRICE CEILING & KINKED MR CURVE
        # ══════════════════════════════════════════════════════════════
        
        # Main Price Ceiling Line
        - Line:
            yIntercept: (params.priceCeiling)
            slope: 0
            color: grey
            strokeWidth: 3
            lineStyle: dashed
            drag: [{vertical: priceCeiling}]
            label: {text: "`P_c`", x: 160}
            show: params.showCeiling

        # New MR (Horizontal part)
        - Segment:
            a: [0, params.priceCeiling]
            b: [(calcs.Qd_at_Pc), (params.priceCeiling)]
            color: cadetblue
            strokeWidth: 4
            label: {text: "`\\t{New MR}`", fontSize: 12}
            show: params.showCeiling

        # New MR (Vertical drop)
        - Segment:
            a: [(calcs.Qd_at_Pc), (params.priceCeiling)]
            b: [(calcs.Qd_at_Pc), (calcs.MR_at_Qd)]
            color: cadetblue
            strokeWidth: 3
            lineStyle: dashed
            show: params.showCeiling

        # New MR (Downward sloping remainder)
        - Line:
            yIntercept: 160
            slope: -2
            min: (calcs.Qd_at_Pc)
            max: 80
            color: cadetblue
            strokeWidth: 4
            show: params.showCeiling

    sidebar:
      controls:
        - title: Market Controls
          sliders:
            - {param: priceCeiling, label: '`\\text{Price Ceiling}`'}
          checkboxes:
            - {param: showCeiling, label: '`\\text{Show Price Ceiling / New MR}`'}
            - {param: showProfit, label: '`\\text{Show Total Profit/Loss}`'}
            - {param: showDWL, label: '`\\text{Show DWL}`'}
          divs:
            - html: "`<hr/><b>Firm's Automated Choice:</b>`"
            - html: "`The firm maximizes profit where New MR crosses MC, producing <b>${calcs.Q_opt.toFixed(0)} units</b>.`"
            - html: "`Price (P) = $${calcs.P_opt.toFixed(0)}`"
            - html: "`ATC = $${calcs.ATC_opt.toFixed(1)}`"
            
            - html: "`<span style=\"color:green\"><b>Economic Profit:</b> $${calcs.profit.toFixed(0)}</span>`"
              show: (calcs.profit > 0.5)
              
            - html: "`<span style=\"color:firebrick\"><b>Economic Loss:</b> $${Math.abs(calcs.profit).toFixed(0)}. <br><em>The firm requires a government subsidy to survive!</em></span>`"
              show: (calcs.profit < -0.5)
              
            - html: "`<span style=\"color:darkorange\"><b>Normal Profit:</b> Breaking even (P = ATC).</span>`"
              show: (calcs.profit >= -0.5 && calcs.profit <= 0.5)