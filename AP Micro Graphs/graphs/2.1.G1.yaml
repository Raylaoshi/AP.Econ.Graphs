title: Demand vs. Quantity Demanded
title_zh: 需求变动 vs. 需求量变动
label: 2.1.G1
eyebrow: Unit 2 — Supply and Demand
eyebrow_zh: 第二单元 — 供给与需求
description: |
  <p>A fundamental rule in microeconomics: A change in the price of the good itself causes a <strong>movement along</strong> the demand curve (a change in <em>quantity demanded</em>). A change in any non-price determinant (like income, preferences, or prices of related goods) causes a <strong>shift</strong> of the entire demand curve (a change in <em>demand</em>).</p>
  <p><strong>Interactive features to explore:</strong></p>
  <ol>
    <li><strong>Movement along the curve:</strong> Drag the blue point up and down to change the price. Notice how the curve itself stays frozen, but the quantity demanded changes. This is the Law of Demand in action.</li>
    <li><strong>Shift of the curve:</strong> Drag the Demand curve left or right to simulate a change in a non-price factor (e.g., a successful ad campaign). At every single price level, the quantity demanded has changed, which means <em>Demand</em> has changed.</li>
    <li><strong>Visual Guides:</strong> Use the checkboxes to draw arrows that map exactly where the point or the curve originated.</li>
  </ol>
description_zh: |
  <p>微观经济学中的一个绝对核心法则：商品自身价格的变化会导致沿需求曲线的<strong>移动</strong>（即<strong>需求量</strong>的变动）。而任何非价格决定因素（如收入、偏好、相关商品价格等）的变化，都会导致整条需求曲线发生<strong>平移</strong>（即<strong>需求</strong>的变动）。</p>
  <p><strong>动一动：</strong></p>
  <ol>
    <li><strong>沿曲线移动：</strong> 上下拖动蓝色端点来改变价格。你会发现，需求曲线本身纹丝不动，只有对应的需求量发生了改变。这就是需求法则的直观体现。</li>
    <li><strong>曲线的平移：</strong> 左右拖动需求曲线，模拟非价格因素的变化（例如一次成功的广告营销）。此时在每一个既定的价格水平下，需求量都发生了改变，这意味着<strong>需求（整体）</strong>发生了变动。</li>
    <li><strong>视觉辅助：</strong> 勾选右侧的复选框，系统会画出辅助箭头，帮你精准追踪端点和曲线的原始出处。</li>
  </ol>

schema: EconSchema
version: 1

params:
  - {name: price, value: 10, min: 2, max: 18, round: 1}
  - {name: demandShift, value: 0, min: -8, max: 8, round: 1}
  - {name: showMovement, value: true}
  - {name: showShift, value: true}
  - {name: baseP, value: 10}

calcs:
  # Current Demand Curve (D1)
  newQd: (20 + (params.demandShift) - (params.price))
  
  # Original Demand Curve (D0)
  origQd: (20 - (params.price))
  
  # Base point for Movement Arrow (anchored to current curve at P=10)
  baseQd: (20 + (params.demandShift) - (params.baseP))
  
  # Logic Toggles
  isShifted: ((params.demandShift) != 0)
  isMoved: ((params.price) != (params.baseP))

layout:
  OneGraphPlusSidebar:
    graph:
      xAxis:
        title: Quantity Demanded ($Q_d$)
        max: 30
        ticks: 6
      yAxis:
        title: Price ($P$)
        max: 25
        min: 0
        ticks: 5
      objects:

        # ══════════════════════════════════════════════════════════════
        # SHIFT: Original Demand Curve (D0) - Visible when shifted
        # ══════════════════════════════════════════════════════════════
        - Line:
            yIntercept: 20
            slope: -1
            max: 20
            color: grey
            strokeWidth: 2
            lineStyle: dashed
            label:
              text: D_0
              x: 18
            show: (params.showShift && calcs.isShifted)

        # ══════════════════════════════════════════════════════════════
        # SHIFT: ghost point and Arrow from D0 to D1
        # ══════════════════════════════════════════════════════════════
        - Point:
            coordinates: [10, (params.baseP)]
            color: grey
            r: 4
            show: (calcs.isShifted)

        - Segment:
            a: [(calcs.origQd), (params.price)]
            b: [(calcs.newQd), (params.price)]
            color: grey  
            strokeWidth: 3
            endArrow: true
            trim: 0.05
            show: (params.showShift && calcs.isShifted)
            label:
              text: \text{Shift}
              position: b
              fontSize: 10
              bgcolor: none

        # ══════════════════════════════════════════════════════════════
        # CURRENT: Main Demand Curve (D1)
        # ══════════════════════════════════════════════════════════════
        - Line:
            yIntercept: (20 + (params.demandShift))
            slope: -1
            max: (20 + (params.demandShift))
            color: blue
            strokeWidth: 3
            drag:
              - horizontal: demandShift
            label:
              text: "`${calcs.isShifted ? 'D_1' : 'D_0'}`"
              x: (18 + (params.demandShift))

        # ══════════════════════════════════════════════════════════════
        # MOVEMENT: Ghost point and arrow along the curve
        # ══════════════════════════════════════════════════════════════
        - Point:
            coordinates: [(calcs.baseQd), (params.baseP)]
            color: grey
            r: 4
            show: (params.showMovement && calcs.isMoved)

        - Segment:
            a: [(calcs.baseQd), (params.baseP)]
            b: [(calcs.newQd), (params.price)]
            color: blue
            strokeWidth: 1
            endArrow: true
            trim: 0.05
            show: (params.showMovement && calcs.isMoved)
            label:
              text: \text{Movement}
              position: r
              fontSize: 10
              bgcolor: none

        # ══════════════════════════════════════════════════════════════
        # CURRENT: Draggable Point (Qd at current Price)
        # ══════════════════════════════════════════════════════════════
        - Point:
            coordinates: [(calcs.newQd), (params.price)]
            color: blue
            r: 6
            drag:
              - vertical: price
            droplines:
              vertical: '`Q = ${calcs.newQd.toFixed(0)}`'
              horizontal: '`P = \\$${params.price.toFixed(0)}`'

    sidebar:
      controls:
        - title: Market Controls
          description: Drag the blue point or the demand curve itself.
          sliders:
            - param: price
              label: \text{Price}
            - param: demandShift
              label: \text{Non-Price}
          checkboxes:
            - param: showMovement
              label: \text{Show movement along curve}
            - param: showShift
              label: \text{Show shift of the curve}
          divs:
            - html: "`<hr/><b>Current State:</b>`"
            - html: "`At a price of $${params.price.toFixed(0)}, the <strong>Quantity Demanded</strong> is ${calcs.newQd.toFixed(0)} units.`"
