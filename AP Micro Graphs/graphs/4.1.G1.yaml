title: Typical Monopoly
title_zh: 典型垄断
label: 4.1.G1
eyebrow: Unit 4 — Imperfect Competition
eyebrow_zh: 第四单元 — 不完全竞争
description: |
  <p>Being the only seller in town gives a monopoly market power. Because it faces a downward-sloping demand curve, its marginal revenue (MR) is always lower than the price. To maximize profit, the firm follows a simple rule: produce exactly where <strong>MR = MC</strong>, and charge the highest price consumers are willing to pay along the demand curve.</p>
  <p><strong>Interactive features to explore:</strong></p>
  <ol>
    <li><strong>Explore the market:</strong> Toggle the Free Explore box and drag the point to manually adjust output (Q). See how producing beyond MR = MC hurts profit.</li>
    <li><strong>Optimal:</strong> Uncheck Free Explore to lock the graph to the profit-maximizing quantity (Q*).</li>
    <li><strong>Total Profit:</strong> Watch the profit (or loss) rectangle shrink if you increase fixed costs (Lump-Sum).</li>
    <li><strong>Short-Run Analysis:</strong> Pull the Demand curve down—if the price (P) drops below Average Variable Cost (AVC), shutting down becomes the best move.</li>
    <li><strong>Efficiency and DWL:</strong> Monopolies underproduce compared to the socially optimal benchmark (P = MC), leaving behind a deadweight loss (DWL) for society.</li>
  </ol>
description_zh: |
  <p>作为市场上的唯一卖家，垄断企业拥有定价权。由于面临向下倾斜的需求曲线，它的边际收益（MR）总是低于价格。为了实现利润最大化，企业的法则是：在 <strong>MR = MC</strong> 处确定产量，并按需求曲线上对应的最高价格来收费。</p>
  <p><strong>动一动：</strong></p>
  <ol>
    <li><strong>自由探索：</strong> 勾选自由探索框，拖动端点手动调整产量（Q），直观研究为什么越过 MR = MC 会导致利润受损。</li>
    <li><strong>最优：</strong> 取消勾选自由探索，将图表锁定在利润最大化的目标产量 Q* 上。</li>
    <li><strong>总利润：</strong> 如果你增加固定成本（一次性总额税），观察利润矩形是如何缩水的。</li>
    <li><strong>短期分析：</strong> 试着将需求曲线大幅下拉，当价格（P）跌破平均可变成本（AVC）时，直接关门停业才是止损的最好选择。</li>
    <li><strong>效率与无谓损失：</strong> 将垄断的决定与社会最优的完全竞争基准（P = MC）比一比，垄断导致的生产不足会给社会留下一块明显的无谓损失（DWL）。</li>
  </ol>

schema: EconSchema
version: 5

colors:
  demandBlue: rgb(41, 128, 185)
  avcDarkOrange: rgb(230, 140, 30)

params:
- {name: Q_firm, value: 7, min: 0, max: 15, round: 0.1}
- {name: demandShift, value: 0, min: -20, max: 20, round: 1}

# ── Category views ──
- {name: showExplore, value: false}
- {name: showOptimal, value: true}
- {name: showTotalProfit, value: false}
- {name: showShortRun, value: false}
- {name: showEfficiency, value: false}

# ── Independent area toggles ──
- {name: showTR, value: false}
- {name: showTC, value: false}
- {name: showTVC, value: false}
- {name: showTFC, value: false}

# ── Tax / Subsidy sliders ──
- {name: perUnitTax, value: 0, min: -10, max: 10, round: 0.5}
- {name: lumpSumTax, value: 0, min: -30, max: 30, round: 1}

calcs:
  varShift: (params.perUnitTax)
  TFC_total: (50 + params.lumpSumTax)
  demandInt: (30 + params.demandShift)

  # --- OPTIMAL (Target) ENGINE ---
  qStar:   (1.5 + sqrt(max(0, 2*(calcs.demandInt) - 2*calcs.varShift - 29.75)))
  pStar:   ((calcs.demandInt) - 1.25*(calcs.qStar))
  atcStar: (16 - 2*(calcs.qStar) + (1/6)*((calcs.qStar)^2) + calcs.varShift + calcs.TFC_total/(calcs.qStar))
  avcStar: (16 - 2*(calcs.qStar) + (1/6)*((calcs.qStar)^2) + calcs.varShift)
  mcStar:  (16 - 4*(calcs.qStar) + 0.5*((calcs.qStar)^2) + calcs.varShift)
  profitStar: ((calcs.pStar - calcs.atcStar) * (calcs.qStar))
  
  # Optimal Totals (Locked to qStar)
  trStar: ((calcs.pStar) * (calcs.qStar))
  tvcStar: ((calcs.avcStar) * (calcs.qStar))
  tcStar: ((calcs.atcStar) * (calcs.qStar))

  # --- FREE EXPLORE ENGINE (Tied to params.Q_firm) ---
  P_explore: ((calcs.demandInt) - 1.25*(params.Q_firm))
  MR_explore: ((calcs.demandInt) - 2.5*(params.Q_firm))
  MC_explore: (16 - 4*(params.Q_firm) + 0.5*((params.Q_firm)^2) + calcs.varShift)
  margProfit: ((calcs.MR_explore) - (calcs.MC_explore))
  margProfitMid: (((calcs.MR_explore) + (calcs.MC_explore)) / 2)

  # --- EFFICIENCY ENGINE ---
  qComp: (2.75 + sqrt(max(0, 2*(calcs.demandInt) - 2*calcs.varShift - 24.4375)))
  pComp: ((calcs.demandInt) - 1.25*(calcs.qComp))

layout:
  OneGraphPlusSidebar:
    graph:
      xAxis: {title: Quantity, max: 16, ticks: 8}
      yAxis: {title: Price, max: 35, min: 0, ticks: 10}
      objects:

        # ══════════════════════════════════════════════════════════════
        # AREA OVERLAYS (Locked to qStar, Color-Matched to Curves)
        # ══════════════════════════════════════════════════════════════

        - Rectangle:
            x1: 0
            y1: (calcs.pStar)
            x2: (calcs.qStar)
            y2: 0
            color: demandBlue
            opacity: 0.1
            show: params.showTR
            label:
              text: "`TR = ${calcs.trStar.toFixed(1)}`"

        - Rectangle:
            x1: 0
            y1: (calcs.atcStar)
            x2: (calcs.qStar)
            y2: 0
            color: orange
            opacity: 0.1
            show: params.showTC
            label:
              text: "`TC = ${calcs.tcStar.toFixed(1)}`"

        - Rectangle:
            x1: 0
            y1: (calcs.avcStar)
            x2: (calcs.qStar)
            y2: 0
            color: avcDarkOrange
            opacity: 0.1
            show: params.showTVC
            label:
              text: "`TVC = ${calcs.tvcStar.toFixed(1)}`"

        - Rectangle:
            x1: 0
            y1: (calcs.atcStar)
            x2: (calcs.qStar)
            y2: (calcs.avcStar)
            color: grey
            opacity: 0.12
            show: params.showTFC
            label:
              text: "`TFC = ${calcs.TFC_total.toFixed(0)}`"

        # ══════════════════════════════════════════════════════════════
        # TOTAL PROFIT (Locked to qStar)
        # ══════════════════════════════════════════════════════════════

        - Rectangle:
            x1: 0
            y1: (calcs.pStar)
            x2: (calcs.qStar)
            y2: (calcs.atcStar)
            color: "`${calcs.profitStar >= 0 ? 'green' : 'red'}`"
            opacity: 0.4
            show: params.showTotalProfit
            label:
              text: "`${calcs.profitStar >= 0 ? 'Profit = ' : 'Loss = '} ${Math.abs(calcs.profitStar).toFixed(1)}`"

        # ══════════════════════════════════════════════════════════════
        # EFFICIENCY & DWL (Locked to qStar)
        # ══════════════════════════════════════════════════════════════

        - Area:
            fn1: (calcs.demandInt) - 1.25*(x)
            fn2: 16 - 4*(x) + 0.5*((x)^2) + calcs.varShift
            min: (calcs.qStar)
            max: (calcs.qComp)
            color: grey
            opacity: 0.3
            show: params.showEfficiency

        - Segment:
            a: [(calcs.qComp), 0]
            b: [(calcs.qComp), (calcs.pComp)]
            lineStyle: dotted
            strokeWidth: 1.5
            color: grey
            show: params.showEfficiency

        - Segment:
            a: [0, (calcs.pComp)]
            b: [(calcs.qComp), (calcs.pComp)]
            lineStyle: dotted
            strokeWidth: 1.5
            color: grey
            show: params.showEfficiency

        - Point:
            coordinates: [(calcs.qComp), (calcs.pComp)]
            color: grey
            r: 5
            label: {text: "`P=MC`", position: bl}
            droplines:
              vertical:   '`Q_{pc} = ${calcs.qComp.toFixed(1)}`'
              horizontal: '`P_{pc} = ${calcs.pComp.toFixed(1)}`'
            show: params.showEfficiency

        # ══════════════════════════════════════════════════════════════
        # EXPLORE: MARGINAL PROFIT ARROW (Tied to Q_firm)
        # ══════════════════════════════════════════════════════════════

        - Segment:
            a: [(params.Q_firm), (calcs.MC_explore)]
            b: [(params.Q_firm), (calcs.MR_explore)]
            color: "`${calcs.margProfit >= 0 ? 'cadetblue' : 'red'}`"
            strokeWidth: 3
            startArrow: true
            endArrow: true
            show: params.showExplore

        - Label:
            coordinates: [(params.Q_firm), (calcs.margProfitMid)]
            text: "`${calcs.margProfit >= 0 ? '+' : ''}${calcs.margProfit.toFixed(1)}`"
            color: "`${calcs.margProfit >= 0 ? 'cadetblue' : 'red'}`"
            position: r
            show: params.showExplore

        - Point:
            coordinates: [(params.Q_firm), (calcs.MC_explore)]
            r: 5
            color: red
            droplines: {horizontal: '`MC = ${calcs.MC_explore.toFixed(1)}`'}
            show: params.showExplore
        
        - Point:
            coordinates: [(params.Q_firm), (calcs.MR_explore)]
            r: 5
            color: cadetblue
            droplines: {horizontal: '`MR = ${calcs.MR_explore.toFixed(1)}`'}
            show: params.showExplore

        # ══════════════════════════════════════════════════════════════
        # ALWAYS VISIBLE — Base Curves + Drag Handle
        # ══════════════════════════════════════════════════════════════

        - Point:
            coordinates: [(params.Q_firm), (calcs.P_explore)]
            color: grey
            r: 4
            drag: [{horizontal: Q_firm}]
            droplines:
              vertical: '`${params.Q_firm.toFixed(1)}`'
              horizontal: '`${calcs.P_explore.toFixed(1)}`'
            show: params.showExplore

        - Line:
            yIntercept: (calcs.demandInt)
            slope: -1.25
            max: "(calcs.demandInt / 1.25)"
            color: demandBlue
            strokeWidth: 2.5
            label: {text: "`D = AR`", x: 13}
            drag: [{vertical: demandShift}]

        - Line:
            yIntercept: (calcs.demandInt)
            slope: -2.5
            min: 0
            max: "(calcs.demandInt / 2.5)"
            color: cadetblue
            strokeWidth: 2
            label: {text: "`MR`", x: 11}

        - Curve:
            fn: 16 - 4*(x) + 0.5*((x)^2) + calcs.varShift
            min: 0
            color: red
            strokeWidth: 2.5
            label: {text: "`MC`", x: 10}

        - Curve:
            fn: 16 - 2*(x) + (1/6)*((x)^2) + calcs.varShift + calcs.TFC_total/(x)
            min: 0
            color: orange
            strokeWidth: 2.5
            label: {text: "`ATC`", x: 14, position: tr}

        - Curve:
            fn: 16 - 2*(x) + (1/6)*((x)^2) + calcs.varShift
            min: 0
            color: avcDarkOrange
            strokeWidth: 2
            label: {text: "`AVC`", x: 14, position: t}
            show: (params.showShortRun || params.showTVC || params.showTFC)

        # ══════════════════════════════════════════════════════════════
        # OPTIMAL — Target Points (Locked to qStar)
        # ══════════════════════════════════════════════════════════════

        - Point:
            coordinates: [(calcs.qStar), (calcs.pStar)]
            color: demandBlue
            r: 5
            droplines:
              vertical: '`Q^* = ${calcs.qStar.toFixed(1)}`'
              horizontal: '`P^* = ${calcs.pStar.toFixed(1)}`'
            show: (params.showOptimal && (calcs.profitStar >= 0))

        - Point:
            coordinates: [(calcs.qStar), (calcs.pStar)]
            color: demandBlue
            r: 5
            droplines:
              vertical:
              horizontal: '`P^* = ${calcs.pStar.toFixed(1)}`'
            show: (params.showOptimal && (calcs.profitStar < 0))

        - Point:
            coordinates: [(calcs.qStar), (calcs.atcStar)]
            color: orange
            r: 5
            droplines:
              vertical:
              horizontal: '`ATC = ${calcs.atcStar.toFixed(1)}`'
            show: (params.showOptimal && (calcs.profitStar >= 0))

        - Point:
            coordinates: [(calcs.qStar), (calcs.atcStar)]
            color: orange
            r: 5
            droplines:
              vertical: '`Q^* = ${calcs.qStar.toFixed(0)}`'
              horizontal: '`ATC = ${calcs.atcStar.toFixed(1)}`'
            show: (params.showOptimal && (calcs.profitStar < 0))

        - Point:
            coordinates: [(calcs.qStar), (calcs.mcStar)]
            color: red
            r: 5
            show: params.showOptimal

        # ══════════════════════════════════════════════════════════════
        # SHORT-RUN POINTS (Locked to qStar)
        # ══════════════════════════════════════════════════════════════

        - Point:
            coordinates: [(calcs.qStar), (calcs.pStar)]
            r: 5
            color: demandBlue
            droplines:
              vertical: '`${calcs.qStar.toFixed(1)}`'
              horizontal: '`${calcs.pStar.toFixed(1)}`'
            show: params.showShortRun

        - Point:
            coordinates: [(calcs.qStar), (calcs.avcStar)]
            r: 5
            color: avcDarkOrange
            droplines:
              vertical:
              horizontal: '`AVC = ${calcs.avcStar.toFixed(1)}`'
            show: (params.showShortRun || params.showTVC || params.showTFC)

    sidebar:
      controls:
        - title: Monopoly Analysis
          description: Drag the grey point or use the slider to choose Q.
          sliders:
          - {param: demandShift, label: Demand}
          - {param: perUnitTax, label: Per-Unit \ T/S}
          - {param: lumpSumTax, label: Lump-Sum \ T/S}          
          checkboxes:
          - {param: showExplore,     label: '\text{Free Explore: Marginal Profit}'}
          - {param: showOptimal,     label: '\text{Optimal Target}'}
          - {param: showTotalProfit, label: '\text{Total Profit / Loss}'}
          - {param: showShortRun,    label: '\text{Short-Run Analysis}'}
          - {param: showEfficiency,  label: '\text{Efficiency and DWL}'}
          divs:
          # Free Explore Divs
          - html: "`<b>$MR - MC = ${calcs.margProfit.toFixed(2)}$ → produce <strong>more</strong></b>`"
            show: (params.showExplore && (calcs.margProfit > 0.05))
          - html: "`<b>$MR - MC = ${calcs.margProfit.toFixed(2)}$ → produce <strong>less</strong></b>`"
            show: (params.showExplore && (calcs.margProfit < -0.05))
          - html: "`<b>$MR = MC$ — at optimal $Q^*$</b>`"
            show: (params.showExplore && (calcs.margProfit >= -0.05) && (calcs.margProfit <= 0.05))

          # Locked Optimal Divs
          - html: "`<b>$Q^* = ${calcs.qStar.toFixed(1)}$, $P^* = ${calcs.pStar.toFixed(1)}$</b>`"
            show: params.showOptimal
          - html: "`<b>Profit = ${calcs.profitStar.toFixed(1)}</b>`"
            show: params.showTotalProfit
          - html: "`<b>$TR = ${calcs.trStar.toFixed(1)}$, $TC = ${calcs.tcStar.toFixed(1)}$</b>`"
            show: params.showTotalProfit
          - html: "`<b>$P = ${calcs.pStar.toFixed(1)}$, $AVC = ${calcs.avcStar.toFixed(1)}$</b>`"
            show: params.showShortRun
          - html: "`<b>$P > AVC$: firm <strong>operates</strong></b>`"
            show: (params.showShortRun && (calcs.pStar > calcs.avcStar))
          - html: "`<b>$P < AVC$: firm should <strong>shut down</strong></b>`"
            show: (params.showShortRun && (calcs.pStar < calcs.avcStar))
          - html: "`<b>$Q_{pc} = ${calcs.qComp.toFixed(1)}$, $P_{pc} = ${calcs.pComp.toFixed(1)}$</b>`"
            show: params.showEfficiency
          - html: "`<b>DWL exists: $Q^* < Q_{pc}$</b>`"
            show: (params.showEfficiency && (calcs.qStar < calcs.qComp))

          - html: "`<b>Per-unit (${params.perUnitTax.toFixed(1)}): shifts $MC$, $AVC$, $ATC$</b>`"
            show: (params.perUnitTax != 0)
          - html: "`<b>Lump-sum (${params.lumpSumTax.toFixed(0)}): shifts $TFC$ & $ATC$ only</b>`"
            show: (params.lumpSumTax != 0)

        - title: Total Variables
          checkboxes:
          - {param: showTR,  label: '\text{TR Rectangle}'}
          - {param: showTC,  label: '\text{TC Rectangle}'}
          - {param: showTVC, label: '\text{TVC Rectangle}'}
          - {param: showTFC, label: '\text{TFC Rectangle}'}
