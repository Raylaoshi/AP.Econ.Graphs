title: PC Firm's Profit-Maximizing Behaviour
title_zh: 完全竞争企业的利润最大化行为
label: 3.4.G2
eyebrow: Unit 3 — Production, Cost, and Perfect Competition
eyebrow_zh: 第三单元 — 生产、成本与完全竞争模型
description: |
  <p>In a perfectly competitive market, the representative firm is a <strong>price taker</strong>. The market equilibrium on the left dictates the perfectly elastic demand curve (d<sub>f</sub> = MR = AR) for the individual firm on the right. To maximize economic profit, the firm produces where <strong>MR = MC</strong>.</p>
  <p><strong>Interactive features:</strong></p>
  <ol>
    <li><strong>Market Shifts:</strong> Drag the Market Demand or Supply curves to see how the "handshake" of price instantly synchronizes with the firm's revenue line.</li>
    <li><strong>Cost Shifters:</strong> Use the sliders to simulate <strong>per-unit taxes/subsidies</strong> (which shift MC, AVC, and ATC) or <strong>lump-sum interventions</strong> (which shift only fixed costs and ATC).</li>
    <li><strong>Free Explore:</strong> Toggle this to manually drag the firm's quantity and investigate marginal profit. All other analysis views are mathematically locked to the firm's optimal outcome (Q*).</li>
  </ol>
description_zh: |
  <p>在完全竞争市场中，典型企业是<strong>价格的接受者</strong>。左侧的市场均衡直接决定了右侧企业的完全弹性需求曲线（d<sub>f</sub> = MR = AR）。为了实现利润最大化，企业会遵循 <strong>MR = MC</strong> 的原则来确定产量 Q*。</p>
  <p><strong>可调节元素：</strong></p>
  <ol>
    <li><strong>自由探索：</strong> 勾选此项以手动拖动企业的产量，直观研究边际利润的变化。其他所有的分析视图都紧紧锁定在企业的最优目标产量 (Q*) 上。</li>
    <li><strong>总量变化：</strong> 在下方勾选总收入、成本等变量，观察它们在最优产量下的面积构成。</li>
    <li><strong>市场变化：</strong> 拖动左侧市场的需求或供给曲线，观察均衡价格对企业收入的瞬间影响。</li>
    <li><strong>税收和补贴：</strong> 利用滑动条模拟<strong>一次性税/补贴</strong>（同步影响 MC、AVC 和 ATC）或<strong>总额税/补贴</strong>（仅影响固定成本和 ATC）。</li>
  </ol>

schema: EconSchema
version: 5

params:
- {name: demandShift, value: 0, min: -20, max: 20, round: 0.5}
- {name: supplyShift, value: 0, min: -20, max: 20, round: 0.5}
- {name: Q_firm, value: 10, min: 0.5, max: 20, round: 0.1}
- {name: tfc_base, value: 50, min: 25, max: 75, round: 5}
- {name: wageChange, value: 0, min: -5, max: 10, round: 0.5}
- {name: perUnitTaxSub, value: 0, min: -10, max: 10, round: 1}
- {name: lumpSumTaxSub, value: 0, min: -50, max: 150, round: 5}

# ── Category views ──
- {name: showExplore, value: false}
- {name: showOptimal, value: true}
- {name: showTotalProfit, value: false}
- {name: showShortRun, value: false}

# ── Independent area toggles ──
- {name: showTR, value: false}
- {name: showTC, value: false}
- {name: showTVC, value: false}
- {name: showTFC, value: false}

calcs:
  varShift: ((params.wageChange) + (params.perUnitTaxSub))
  fixShift: (params.lumpSumTaxSub)
  TFC_total: ((params.tfc_base) + (calcs.fixShift))

  # Market Handshake
  P_firm: (calcs.ourEquilibrium.P)

  # Optimal Q* Engine (Upward-sloping portion where MR=MC)
  qStar: (4 + sqrt(max(0, 2*(calcs.P_firm) - 2*(calcs.varShift) - 16)))
  atcStar: (16 - 2*(calcs.qStar) + (1/6)*((calcs.qStar)^2) + (calcs.varShift) + (calcs.TFC_total)/(calcs.qStar))
  avcStar: (16 - 2*(calcs.qStar) + (1/6)*((calcs.qStar)^2) + (calcs.varShift))
  profitStar: (((calcs.P_firm) - (calcs.atcStar)) * (calcs.qStar))
  
  # Optimal Totals (Locked to qStar)
  trStar: ((calcs.P_firm) * (calcs.qStar))
  tvcStar: ((calcs.avcStar) * (calcs.qStar))
  tcStar: ((calcs.atcStar) * (calcs.qStar))

  # Free Explore Engine (Tied to draggable Q_firm)
  MC_explore: (16 - 4*(params.Q_firm) + 0.5*((params.Q_firm)^2) + (calcs.varShift))
  margProfit: ((calcs.P_firm) - (calcs.MC_explore))
  margProfitMid: (((calcs.P_firm) + (calcs.MC_explore)) / 2)

layout:
  TwoHorizontalGraphs:

    # ══════════════════════════════════════════════════════════════
    # LEFT — Market Equilibrium
    # ══════════════════════════════════════════════════════════════
    leftGraph:
      xAxis: {title: Market Quantity, max: 200, ticks: 0}
      yAxis: {title: Price, max: 50, min: 0, ticks: 10}
      objects:
      - EconLinearEquilibrium:
          name: ourEquilibrium
          demand:
            name: ourDemand
            xIntercept: 235 + 10*(params.demandShift)
            invSlope: -5
            color: blue
            drag: [{vertical: demandShift}]
            label: {text: "`D`", x: 180}
          supply:
            name: ourSupply
            yIntercept: 5 + params.supplyShift
            slope: 0.2
            color: darkorange
            drag: [{vertical: supplyShift}]
            label: {text: "`S`", x: 180}
          equilibrium:
            color: green
            droplines:
              vertical: "`Q_m = ${calcs.ourEquilibrium.Q.toFixed(0)}`"
              horizontal: "`P_m = ${calcs.ourEquilibrium.P.toFixed(1)}`"

    leftControls:
      title: Market
      description: Drag curves or use sliders.
      sliders:
      - {param: demandShift, label: Demand}
      - {param: supplyShift, label: Supply}
      divs:
      - html: "`<b>P<sub>m</sub> = ${calcs.ourEquilibrium.P.toFixed(1)}, Q<sub>m</sub> = ${calcs.ourEquilibrium.Q.toFixed(0)}</b>`"

    # ══════════════════════════════════════════════════════════════
    # RIGHT — Firm (price-taker)
    # ══════════════════════════════════════════════════════════════
    rightGraph:
      xAxis: {title: Firm Quantity (q), max: 20, ticks: 10}
      yAxis: {title: Price / Cost ($), max: 50, min: 0, ticks: 10}
      objects:

        # ══════════════════════════════════════════════════════════
        # AREA OVERLAYS (Locked to qStar, Color-Matched to Curves)
        # ══════════════════════════════════════════════════════════
        - Rectangle:
            x1: 0
            y1: (calcs.P_firm)
            x2: (calcs.qStar)
            y2: 0
            color: blue
            opacity: 0.1
            show: params.showTR
            label: {text: "`\\t{TR = ${calcs.trStar.toFixed(1)}}`"}

        - Rectangle:
            x1: 0
            y1: (calcs.atcStar)
            x2: (calcs.qStar)
            y2: 0
            color: orange
            opacity: 0.1
            show: params.showTC
            label: {text: "`\\t{TC = ${calcs.tcStar.toFixed(1)}}`"}

        - Rectangle:
            x1: 0
            y1: (calcs.avcStar)
            x2: (calcs.qStar)
            y2: 0
            color: hotpink
            opacity: 0.1
            show: params.showTVC
            label: {text: "`\\t{TVC = ${calcs.tvcStar.toFixed(1)}}`"}

        - Rectangle:
            x1: 0
            y1: (calcs.atcStar)
            x2: (calcs.qStar)
            y2: (calcs.avcStar)
            color: grey
            opacity: 0.12
            show: params.showTFC
            label: {text: "`\\t{TFC = ${calcs.TFC_total.toFixed(0)}}`"}

        # ══════════════════════════════════════════════════════════
        # TOTAL PROFIT (Locked to qStar)
        # ══════════════════════════════════════════════════════════
        - Rectangle:
            x1: 0
            y1: (calcs.P_firm)
            x2: (calcs.qStar)
            y2: (calcs.atcStar)
            color: "`${calcs.profitStar >= 0 ? 'green' : 'red'}`"
            opacity: 0.4
            show: params.showTotalProfit
            label: {text: "`${calcs.profitStar >= 0 ? '\\t{Profit = }' : '\\t{Loss = }'} ${Math.abs(calcs.profitStar).toFixed(1)}`"}

        # ══════════════════════════════════════════════════════════
        # EXPLORE: MARGINAL PROFIT ARROW (Tied to Q_firm)
        # ══════════════════════════════════════════════════════════
        - Segment:
            a: [(params.Q_firm), (calcs.MC_explore)]
            b: [(params.Q_firm), (calcs.P_firm)]
            color: "`${calcs.margProfit >= 0 ? 'cadetblue' : 'red'}`"
            strokeWidth: 3
            startArrow: true
            endArrow: true
            show: params.showExplore

        - Label:
            coordinates: [(params.Q_firm), (calcs.margProfitMid)]
            text: "`${calcs.margProfit >= 0 ? '+' : ''}${calcs.margProfit.toFixed(1)}`"
            color: "`${calcs.margProfit >= 0 ? 'cadetblue' : 'red'}`"
            position: r
            show: params.showExplore

        - Point:
            coordinates: [(params.Q_firm), (calcs.MC_explore)]
            r: 5
            color: red
            droplines: {horizontal: '`MC = ${calcs.MC_explore.toFixed(1)}`'}
            show: params.showExplore
        
        - Point:
            coordinates: [(params.Q_firm), (calcs.P_firm)]
            r: 5
            color: cadetblue
            droplines: {horizontal: '`MR = ${calcs.P_firm.toFixed(1)}`'}
            show: params.showExplore

        # ══════════════════════════════════════════════════════════
        # ALWAYS VISIBLE — curves + grey drag handle
        # ══════════════════════════════════════════════════════════
        - Point:
            coordinates: [(params.Q_firm), (calcs.P_firm)]
            color: cadetblue
            r: 4
            drag: [{horizontal: Q_firm}]
            droplines: {vertical: '`${params.Q_firm.toFixed(1)}`'}
            show: params.showExplore

        - Line:
            yIntercept: (calcs.P_firm)
            slope: 0
            color: cadetblue
            strokeWidth: 2.5
            label: {text: "`d_f = MR = AR`", x: 16}

        - Curve:
            fn: 16 - 4*(x) + 0.5*((x)^2) + (calcs.varShift)
            min: 0.5
            color: red
            strokeWidth: 2.5
            label: {text: "`MC`", x: 13, position: t}

        - Curve:
            fn: 16 - 2*(x) + (1/6)*((x)^2) + (calcs.varShift) + (calcs.TFC_total)/(x)
            min: 0.5
            color: orange
            strokeWidth: 2.5
            label: {text: "`ATC`", x: 19, position: tr}

        - Curve:
            fn: 16 - 2*(x) + (1/6)*((x)^2) + (calcs.varShift)
            min: 0.5
            color: hotpink
            strokeWidth: 2
            label: {text: AVC, x: 18, position: t}
            show: (params.showShortRun || params.showTVC || params.showTFC)

        # ══════════════════════════════════════════════════════════
        # OPTIMAL — Target Points (Locked to qStar)
        # ══════════════════════════════════════════════════════════
        - Point:
            coordinates: [(calcs.qStar), (calcs.P_firm)]
            color: blue
            r: 5
            droplines:
              vertical: '`Q^* = ${calcs.qStar.toFixed(1)}`'
              horizontal: '`P = ${calcs.P_firm.toFixed(1)}`'
            show: (params.showOptimal && (calcs.profitStar >= 0))

        - Point:
            coordinates: [(calcs.qStar), (calcs.P_firm)]
            color: blue
            r: 5
            droplines:
              vertical:
              horizontal: '`${calcs.P_firm.toFixed(1)}`'
            show: (params.showOptimal && (calcs.profitStar < 0))

        - Point:
            coordinates: [(calcs.qStar), (calcs.atcStar)]
            color: orange
            r: 5
            droplines:
              vertical:
              horizontal: '`ATC = ${calcs.atcStar.toFixed(1)}`'
            show: (params.showOptimal && (calcs.profitStar >= 0))

        - Point:
            coordinates: [(calcs.qStar), (calcs.atcStar)]
            color: orange
            r: 5
            droplines:
              vertical: '`Q^* = ${calcs.qStar.toFixed(1)}`'
              horizontal: '`ATC = ${calcs.atcStar.toFixed(1)}`'
            show: (params.showOptimal && (calcs.profitStar < 0))

        # ══════════════════════════════════════════════════════════
        # SHORT-RUN POINTS (Locked to qStar)
        # ══════════════════════════════════════════════════════════
        - Point:
            coordinates: [(calcs.qStar), (calcs.P_firm)]
            r: 5
            color: blue
            droplines:
              vertical: '`${calcs.qStar.toFixed(1)}`'
              horizontal: '`P = ${calcs.P_firm.toFixed(1)}`'
            show: params.showShortRun

        - Point:
            coordinates: [(calcs.qStar), (calcs.avcStar)]
            r: 5
            color: hotpink
            droplines:
              vertical:
              horizontal: '`AVC = ${calcs.avcStar.toFixed(1)}`'
            show: (params.showShortRun || params.showTVC || params.showTFC)

    # ══════════════════════════════════════════════════════════════
    # RIGHT CONTROLS — Firm sidebar
    # ══════════════════════════════════════════════════════════════
    rightControls:
      title: Firm Analysis
      sliders:
      - {param: Q_firm,        label: Quantity}
      - {param: wageChange,    label: ΔWage}
      - {param: perUnitTaxSub, label: Per-Unit \ T/S}
      - {param: lumpSumTaxSub, label: Lump-Sum \ T/S}

      checkboxes:
      - {param: showExplore,     label: '`\\text{Free Explore: Marginal Profit}`'}
      - {param: showOptimal,     label: '`\\text{Optimal Target}`'}
      - {param: showTotalProfit, label: '`\\text{Total Profit / Loss}`'}
      - {param: showShortRun,    label: '`\\text{Short-Run Analysis}`'}
      - {param: showTR,          label: '`\\text{TR Rectangle}`'}
      - {param: showTC,          label: '`\\text{TC Rectangle}`'}
      - {param: showTVC,         label: '`\\text{TVC Rectangle}`'}
      - {param: showTFC,         label: '`\\text{TFC Rectangle}`'}

      divs:
      # Free Explore Divs
      - html: "`<hr>`"
      - html: "`<b>$P - MC$ = ${calcs.margProfit.toFixed(2)} → produce <strong>more</strong></b>`"
        show: (params.showExplore && (calcs.margProfit > 0.05))
      - html: "`<b>$P - MC$ = ${calcs.margProfit.toFixed(2)} → produce <strong>less</strong></b>`"
        show: (params.showExplore && (calcs.margProfit < -0.05))
      - html: "`<b>$P = MC$ — at optimal $Q^*$</b>`"
        show: (params.showExplore && (calcs.margProfit >= -0.05) && (calcs.margProfit <= 0.05))
      
      # Locked Optimal Divs
      - html: "`<b>$Q^*$ = ${calcs.qStar.toFixed(1)}, $P$ = ${calcs.P_firm.toFixed(1)}</b>`"
        show: params.showOptimal
      - html: "`<b>$Profit = ${calcs.profitStar.toFixed(1)}$</b>`"
        show: params.showTotalProfit
      - html: "`<b>$TR = ${calcs.trStar.toFixed(1)}$, $TC = ${calcs.tcStar.toFixed(1)}$</b>`"
        show: params.showTotalProfit
      - html: "`<b>$P = ${calcs.P_firm.toFixed(1)}$, $AVC = ${calcs.avcStar.toFixed(1)}$</b>`"
        show: params.showShortRun
      - html: "`<b>P > AVC: firm operates</b>`"
        show: (params.showShortRun && (calcs.P_firm > calcs.avcStar))
      - html: "`<b>P < AVC: firm should shut down</b>`"
        show: (params.showShortRun && (calcs.P_firm < calcs.avcStar))
      
      # Tax Divs
      - html: "`<b>Per-unit = ${params.perUnitTaxSub.toFixed(0)}: tax shifts MC, AVC, ATC</b>`"
        show: (params.perUnitTaxSub != 0)
      - html: "`<b>Lump-sum = ${params.lumpSumTaxSub.toFixed(0)}: shifts TFC & ATC only</b>`"
        show: (params.lumpSumTaxSub != 0)