title: Constant vs. Increasing Opportunity Cost
title_zh: 机会成本：固定 vs. 递增
label: 1.3.G1
eyebrow: Unit 1 — Basic Economic Concepts
eyebrow_zh: 第一单元 — 经济学基础概念
description: |
  <p>The Production Possibilities Curve (PPC) illustrates the trade-offs an economy faces when choosing what to produce. The slope of the curve represents the <strong>opportunity cost</strong> of producing one more unit of a good.</p>
  <p><strong>Interactive features:</strong></p>
  <ol>
    <li><strong>The Dynamic Step:</strong> Drag the blue point to the right to increase the production of Good X by exactly 20 units (the orange arrow).</li>
    <li><strong>Constant Cost (Left):</strong> Notice how the red vertical arrow stays the exact same length no matter where you drag the point. Resources are perfectly adaptable.</li>
    <li><strong>Increasing Cost (Right):</strong> Watch the red vertical arrow grow larger and larger as you produce more Good X. Because resources are not perfectly adaptable, the economy must give up increasingly larger amounts of Good Y to get the same 20 units of Good X!</li>
  </ol>
description_zh: |
  <p>生产可能性曲线 (PPC) 展示了一个经济体在决定生产什么时面临的权衡取舍。曲线的斜率代表了多生产一单位某物品的<strong>机会成本</strong>。</p>
  <p><strong>动一动：</strong></p>
  <ol>
    <li><strong>动态步长：</strong> 向右拖动蓝色端点，让物品 X 的产量精准增加 20 个单位（橙色水平箭头）。</li>
    <li><strong>固定成本（左图）：</strong> 无论你将端点拖到哪里，红色的垂直箭头长度始终不变。这意味着资源可以完美且无损耗地在两种产品的生产中互相转化。</li>
    <li><strong>递增成本（右图）：</strong> 随着物品 X 产量的增加，红色的垂直箭头变得越来越长。因为资源并非完全适应于所有生产，为了得到相同数量的物品 X，经济体必须放弃越来越多的物品 Y！</li>
  </ol>

schema: EconSchema
version: 1

params:
  - {name: currentX, value: 20, min: 0, max: 80, round: 1}

calcs:
  stepX: 20
  x1: (params.currentX)
  x2: (params.currentX + 20)
  
  # Left Graph: Constant Cost (Y = 100 - X)
  y1_L: (100 - (calcs.x1))
  y2_L: (100 - (calcs.x2))
  cost_L: ((calcs.y1_L) - (calcs.y2_L))
  
  # Right Graph: Increasing Cost (Y = 100 - 0.01X^2)
  y1_R: (100 - 0.01 * ((calcs.x1)^2))
  y2_R: (100 - 0.01 * ((calcs.x2)^2))
  cost_R: ((calcs.y1_R) - (calcs.y2_R))

layout:
  TwoHorizontalGraphs:
    leftGraph:
      xAxis:
        title: Good X
        max: 120
        ticks: 6
      yAxis:
        title: Good Y
        max: 120
        min: 0
        ticks: 6
      objects:
        # Linear Curve
        - Curve:
            fn: 100 - (x)
            color: dodgerblue
            strokeWidth: 3
            label:
              text: "`\\t{PPC}`"
              x: 85
              position: bl

        # Horizontal Arrow (Gain in X)
        - Segment:
            a: [calcs.x1, calcs.y1_L]
            b: [calcs.x2, calcs.y1_L]
            color: darkorange
            strokeWidth: 2
            endArrow: true
            trim: 0.05
            label:
              text: "`+20 \\t{ X}`"
              position: b
              fontSize: 11
              bgcolor: none

        # Vertical Arrow (Cost in Y)
        - Segment:
            a: [calcs.x2, calcs.y1_L]
            b: [calcs.x2, calcs.y2_L]
            color: firebrick
            strokeWidth: 3
            endArrow: true
            trim: 0.05
            label:
              text: "`- ${calcs.cost_L.toFixed(0)} \\t{ Y}`"
              position: l
              fontSize: 11
              bgcolor: none

        # Origin Point
        - Point:
            coordinates: [calcs.x1, calcs.y1_L]
            color: dodgerblue
            r: 5
            drag:
              - horizontal: currentX
            droplines:
              vertical: "`${calcs.x1.toFixed(0)}`"
              horizontal: "`${calcs.y1_L.toFixed(0)}`"

        # Destination Point
        - Point:
            coordinates: [calcs.x2, calcs.y2_L]
            color: grey
            r: 4
            droplines:
              vertical: "`${calcs.x2.toFixed(0)}`"
              horizontal: "`${calcs.y2_L.toFixed(0)}`"

    leftControls:
      title: Constant Opportunity Cost
      sliders:
        - param: currentX
          label: Good X Produced
      divs:
        - html: "`<b>Current Production:</b> X = ${calcs.x1.toFixed(0)}, Y = ${calcs.y1_L.toFixed(0)}`"
        - html: "`<hr/>`"
        - html: "`<b>The Choice:</b> Produce 20 more units of Good X.`"
        - html: "`<span style=\"color:firebrick\"><b>Opportunity Cost:</b> Give up ${calcs.cost_L.toFixed(0)} units of Good Y.</span>`"

    rightGraph:
      xAxis:
        title: Good X
        max: 120
        ticks: 6
      yAxis:
        title: Good Y
        max: 120
        min: 0
        ticks: 5
      objects:
        # Concave Curve
        - Curve:
            fn: 100 - 0.01 * ((x)^2)
            color: dodgerblue
            strokeWidth: 3
            label:
              text: "`\\t{PPC}`"
              x: 85
              position: bl

        # Horizontal Arrow (Gain in X)
        - Segment:
            a: [calcs.x1, calcs.y1_R]
            b: [calcs.x2, calcs.y1_R]
            color: darkorange
            strokeWidth: 2
            endArrow: true
            trim: 0.05
            label:
              text: "`+20 \\t{ X}`"
              position: b
              fontSize: 11
              bgcolor: none

        # Vertical Arrow (Cost in Y)
        - Segment:
            a: [calcs.x2, calcs.y1_R]
            b: [calcs.x2, calcs.y2_R]
            color: firebrick
            strokeWidth: 3
            endArrow: true
            trim: 0.05
            label:
              text: "`- ${calcs.cost_R.toFixed(1)} \\t{ Y}`"
              position: l
              fontSize: 11
              bgcolor: none

        # Origin Point
        - Point:
            coordinates: [calcs.x1, calcs.y1_R]
            color: dodgerblue
            r: 5
            drag:
              - horizontal: currentX
            droplines:
              vertical: "`${calcs.x1.toFixed(0)}`"
              horizontal: "`${calcs.y1_R.toFixed(1)}`"

        # Destination Point
        - Point:
            coordinates: [calcs.x2, calcs.y2_R]
            color: grey
            r: 4
            droplines:
              vertical: "`${calcs.x2.toFixed(0)}`"
              horizontal: "`${calcs.y2_R.toFixed(1)}`"

    rightControls:
      title: Increasing Opportunity Cost
      divs:
        - html: "`<b>Current Production:</b> X = ${calcs.x1.toFixed(0)}, Y = ${calcs.y1_R.toFixed(1)}`"
        - html: "`<hr/>`"
        - html: "`<b>The Choice:</b> Produce 20 more units of Good X.`"
        - html: "`<span style=\"color:firebrick\"><b>Opportunity Cost:</b> Give up ${calcs.cost_R.toFixed(1)} units of Good Y.</span>`"